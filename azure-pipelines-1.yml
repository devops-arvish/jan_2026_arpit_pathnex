trigger: none

pool:
  vmImage: ubuntu-latest
stages:
  - stage: terraformInit
    displayName: Terraform Init
    jobs:
      - job: terraformInit
        displayName: terraform init job
        steps:
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'azurecloud'
              backendAzureRmResourceGroupName: 'arpitRG'
              backendAzureRmStorageAccountName: 'arpitstorageterraform'
              backendAzureRmContainerName: 'arpitstorageterraformcontainer'
              backendAzureRmKey: 'tf/terraform.tfstate'
      - job: terraformPlan
        displayName: Terraform Plan
        steps:
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'plan'
              environmentServiceNameAzureRM: 'azurecloud'
          