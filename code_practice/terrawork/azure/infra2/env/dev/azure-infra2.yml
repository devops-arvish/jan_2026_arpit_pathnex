trigger: none

pool:
  vmImage: ubuntu-latest

stages:
  - stage: terraformInitTest
    displayName: install and init
    jobs:
      - job: install_and_init
        displayName: install terraform and run init
        steps:
        #install tf
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'
          
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'custom'
              workingDirectory: '$(System.DefaultWorkingDirectory)/code_practice/terrawork/azure/infra2/env/dev'
              # outputTo: 'console'
              customCommand: 'fmt'
              environmentServiceNameAzureRM: 'azurecloud'

      - job: terraformLint
        displayName: Terraform Lint & Security
        steps:
        - checkout: self
        
        #install tf
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: 'latest'

        # tflint installation
        - script: |
            curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          displayName: Install TFLint

        # run tflint
        - script: |
            cd code_practice/terrawork/azure/infra2/env/dev
            tflint --init
            tflint --format json | tee tflint-report.json || true
          displayName: Run TFLint

        #artifact stores
        - task: PublishBuildArtifacts@1
          condition: always()
          inputs:
            pathToPublish: 'code_practice/terrawork/azure/infra2/env/dev/tflint-report.json'
            artifactName: 'tflint-report'
            publishLocation: 'Container'
          displayName: Publish TFLint Report

        # tfsec
        - script: |
            curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
            cd code_practice/terrawork/azure/infra2/env/dev
            tfsec .
          displayName: Run tfsec
        
        #checkov
        - script: |
            mkdir -p $(System.DefaultWorkingDirectory)/reports

            docker run --rm \
              -v "$(System.DefaultWorkingDirectory):/tf" \
              bridgecrew/checkov \
              -d /tf/code_practice/terrawork/azure/infra2/env/dev \
              -o json > $(System.DefaultWorkingDirectory)/reports/checkov-report.json || true
          displayName: Run Checkov
          

          #checkov-artifact
        - task: PublishPipelineArtifact@1
          condition: always()
          inputs:
            targetPath: '$(System.DefaultWorkingDirectory)/reports/checkov-report.json'
            artifact: 'checkov-report'
          displayName: Publish Checkov Report
        
          #tf init
        - task: TerraformTask@5
          displayName: terraform init
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)/code_practice/terrawork/azure/infra2/env/dev'
            backendServiceArm: 'azurecloud'
            backendAzureRmResourceGroupName: 'arpitRG'
            backendAzureRmStorageAccountName: 'arpit123'
            backendAzureRmContainerName: 'tfstate'
            backendAzureRmKey: 'dev-terraform.tfstate'
        
        - task: TerraformTask@5
          displayName: tf validate
          inputs:
            provider: 'azurerm'
            command: 'validate'
            workingDirectory: '$(System.DefaultWorkingDirectory)/code_practice/terrawork/azure/infra2/env/dev'
        
        

  - stage: tfPlan
    displayName: terraform plan
    dependsOn: terraformInitTest
    
    jobs:
      - job: tfPlan
        displayName: terraform plan
        steps:
          
        #install tf
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'
        #init
          - task: TerraformTask@5
            displayName: tf init
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)/code_practice/terrawork/azure/infra2/env/dev'
              backendServiceArm: 'azurecloud'
              backendAzureRmResourceGroupName: 'arpitRG'
              backendAzureRmStorageAccountName: 'arpit123'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'dev-terraform.tfstate'
        #plan
          - task: TerraformTask@5
            displayName: tf plan
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: '$(System.DefaultWorkingDirectory)/code_practice/terrawork/azure/infra2/env/dev'
              commandOptions: '-out=tfplan'
              environmentServiceNameAzureRM: 'azurecloud'

          #artifact publish
          - task: PublishPipelineArtifact@1
          
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/code_practice/terrawork/azure/infra2/env/dev/tfplan'
              artifact: 'tfplan'
            displayName: Publish Terraform Plan


  - stage: ManualValidation
    displayName: Manual Validation
    dependsOn: tfPlan
    pool: server
    jobs:
    - job: ManualValidation
      displayName: Manual Validation
      
      steps:
      - task: ManualValidation@1
        displayName: validation
        inputs:
          notifyUsers: |
            mishrapraveenm55@gmail.com
            arvishpanther@gmail.com
          approvers: 'arvishpanther@gmail.com'
          onTimeout: 'reject'

  - stage: tfApply
    dependsOn: ManualValidation
    displayName: apply after validation
    jobs:
    - job: tfApply
      displayName: apply process
      steps:
        - task: DownloadPipelineArtifact@2
          inputs:
            artifact: 'tfplan'
            path: '$(Pipeline.Workspace)/tfplan'
      #install tf
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: 'latest'
      
      #init tf
        - task: TerraformTask@5
          displayName: tf init
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)/code_practice/terrawork/azure/infra2/env/dev'
            backendServiceArm: 'azurecloud'
            backendAzureRmResourceGroupName: 'arpitRG'
            backendAzureRmStorageAccountName: 'arpit123'
            backendAzureRmContainerName: 'tfstate'
            backendAzureRmKey: 'dev-terraform.tfstate'


