        #   inputs:
        #     provider: 'azurerm'
        #     command: 'apply'
        #     workingDirectory: '$(System.DefaultWorkingDirectory)/code_practice/terrawork/azure/infra2/env/dev'
        #     commandOptions: '$(Pipeline.Workspace)/tfplan/tfplan'
        #     environmentServiceNameAzureRM: 'azurecloud'

          