trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
- stage: TerraformInit
  displayName: Terraform Init
  jobs:
    - job: Init
      displayName: Init
      steps:
      - task: TerraformInstaller@1
        inputs:
          terraformVersion: 'latest'

      - task: tfsec@1
        inputs:
          version: 'v1.26.0'
          debug: true

      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'init'
          backendServiceArm: 'azure-spn'
