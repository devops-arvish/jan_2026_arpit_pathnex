pool: 
  vmImage: ubuntu-latest

stages:
- stage: terraforminstall
  displayName: 
  jobs:
    - job: terraformInit
      displayName: 
      steps:
      - task: TerraformInstaller@1
        inputs:
          terraformVersion: 'latest'

      - task: tfsec@1
        inputs:
          workingDirectory: '$(System.DefaultWorkingDirectory)/code_practice/terrawork/azure/ToDoInfra/env/dev'
          version: 'v1.26.0'
          debug: true

    - job: terraformLint
      displayName: 
      steps:
      - task: PowerShell@2
        inputs:
          targetType: 'inline'
          workingDirectory: '$(System.DefaultWorkingDirectory)/code_practice/terrawork/azure/ToDoInfra/env/dev'
          script: |
            tflint --init
            tflint --format json > tflint-report.json

