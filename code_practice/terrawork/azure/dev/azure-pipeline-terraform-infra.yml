# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger: none

pool:
  vmImage: ubuntu-latest

jobs:
  - job: terraformInstaller
    displayName: "Install terraform"
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'
    
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/code_practice/terrawork/azure/dev'
        backendAzureRmUseEntraIdForAuthentication: false
        backendServiceArm: 'azurecloud'
        backendAzureRmResourceGroupName: 'arpitRG'
        backendAzureRmStorageAccountName: 'azurebackendterra'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'terraformBackend.tfstate'


    
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/code_practice/terrawork/azure/dev'
        environmentServiceNameAzureRM: 'azurecloud'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(System.DefaultWorkingDirectory)/code_practice/terrawork/azure/dev'
        environmentServiceNameAzureRM: 'azurecloud'