trigger: none
pool:
  vmImage: ubuntu-latest
stages:
  - stage: terraformInit
    displayName: Terraform Init
    jobs:
      - job: terraformInit
        displayName: terraform init job
        steps:
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: 'latest'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: 'azurecloud'
            backendAzureRmResourceGroupName: 'arpitRG'
            backendAzureRmStorageAccountName: 'arpitstorageterraform'
            backendAzureRmContainerName: 'arpitstorageterraformcontainer'
            backendAzureRmKey: 'tf/terraform.tfstate'          
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'plan'
            environmentServiceNameAzureRM: 'azurecloud'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'destroy'
            environmentServiceNameAzureRM: 'azurecloud'