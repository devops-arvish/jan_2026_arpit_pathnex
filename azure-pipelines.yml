trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: printScriptStage
    displayName: printing the simple script
    jobs:
      - job: printJob
        displayName: printScriptJob
        steps:
          - task: CmdLine@2
            displayName: bash Script to print
            inputs:
              script: echo "kuch bhi"